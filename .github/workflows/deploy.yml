name: Deploy English Lab

on:
  push:
    branches: [main]       # publica automaticamente quando faz push no main
  pull_request:
    branches: [main]       # valida sintaxe em PRs sem publicar

# Permissões necessárias para publicar no GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Evita deploys simultâneos
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  validate:
    name: Validar JavaScript
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Checar sintaxe do JavaScript
        run: |
          errors=0
          for f in js/*.js sw.js; do
            if [ -f "$f" ]; then
              result=$(node --check "$f" 2>&1)
              if [ $? -eq 0 ]; then
                echo "✅ $f"
              else
                echo "❌ $f → $result"
                errors=$((errors+1))
              fi
            fi
          done
          if [ $errors -gt 0 ]; then
            echo "Erros de sintaxe: $errors arquivo(s)"
            exit 1
          fi
          echo "Todos os arquivos JS passaram na verificação de sintaxe."

  deploy:
    name: Publicar no GitHub Pages
    needs: validate          # só publica se a validação passar
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'   # só no push para main, não em PRs

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar GitHub Pages
        uses: actions/configure-pages@v5

      - name: Empacotar arquivos
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'          # raiz do repositório (onde está o index.html)

      - name: Publicar
        id: deployment
        uses: actions/deploy-pages@v4
